  image: "https://quarto.org/quarto.png"
  description: "Amsterdam Imaging Hub"
 
  navbar:
    background: light  # You can change the background color here

    left:   # You can comment out all navigation items here if you just like to keep the index page only
#      - text: Home
#        href: index.qmd   
      - text: News
        href: posts.qmd#category=news
      - text: Events
        href: posts.qmd#category=event
      - text: Research
        menu:
          - text: Projects
            href: projects.qmd
          - text: Facilities
            href: facilities.qmd                                
      - text: Courses # Comment the Teaching part out to remove the Teaching page
        href: teaching.qmd               
      - text: People   # Comment the Group part out to remove the Group page
        href: people.qmd
  
    right: 
      - icon: github
        href: https://github.com/cicwi/AmsterdamImagingHub
        target: _blank
      - text: "{{< fa brands linkedin >}}"
        href: https://www.linkedin.com/groups/13180498/
        target: _blank      
      - icon: rss
        href: posts.xml
        target: _blank
  
  page-navigation: true
  
  page-footer: 
    left: "[Your Name](http://www.github.com) &copy; <script>document.write(new Date().getFullYear())</script>" 
    center: "Build on [Quarto Academic Website Template](https://github.com/drganghe/quarto-academic-website-template) adapted by [Dr. Gang He](http://drganghe.github.io)"
    right:  
      - icon: github
        href: https://github.com/drganghe/quarto-academic-website-template
        target: _blank
      - text: "{{< fa brands bluesky >}}" 
        href: https://bsky.app
        target: _blank
      - icon: rss
        href: posts.xml
        target: _blank  
  
  search:
