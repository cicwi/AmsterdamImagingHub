      title: "FEI Helios Nanolab 600 (SEM/FIB)"
      author: Wiebke Albrecht
      subtitle: "Electron microscopy"
      description: "dual-beam SEM with Ga focused ion beam and gas injectors (Pt, C, SiO₂ deposition; XeF₂ enhanced etch) for nanofabrication and cross-sectioning."
    - path: 
      image: 
      title: "FEI Verios 460"
      author: Wiebke Albrecht
      subtitle: "Electron microscopy"
      description: "high-resolution SEM (nm-scale) with EDS, EBSD, STEM-in-SEM detector, monochromator for low energy spread (<0.2 eV), and a homebuilt EBIC detector."
