      title: "JEOL NeoARM (S)TEM"
      author: Wiebke Albrecht
      subtitle: "Electron microscopy"
      description: "atomic-resolution (S)TEM (0.082 nm STEM, 0.14 nm TEM) with Cs correction and CFEG. Unique features: IDES laser incoupling (NKT supercontinuum, 400–840 nm, tunable repetition rate) with synchronized ns beam blanking, ASI Timepix3 4D-STEM event-driven detector, wide-gap pole piece for a broad range of in situ holders, and EDX. Open-access facility for academic and industrial users."
    - path: 
